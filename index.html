<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>upsilon.dev | Audio</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: black; color: white;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Inter', sans-serif; overflow: hidden;
            perspective: 1200px; touch-action: none;
        }

        /* Brand & Headers */
        .brand-header {
            position: absolute; top: 25px; left: 25px;
            display: flex; flex-direction: column; gap: 5px; z-index: 10;
        }
        .line1 { font-weight: bold; font-size: 1.1rem; }
        .line-mono { font-family: 'Courier New', monospace; font-size: 0.9rem; opacity: 0.8; }

        /* Background Rings */
        .tunnel-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); pointer-events: none;
        }
        .ring {
            position: absolute; width: 160px; height: 160px;
            border: 1.5px solid white; background: transparent;
            transform: translate(-50%, -50%) rotate(45deg) scale(1);
            will-change: transform, opacity;
            animation: wave-expand 3s forwards linear;
        }
        @keyframes wave-expand {
            0% { transform: translate(-50%, -50%) rotate(45deg) scale(1); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) rotate(45deg) scale(5); opacity: 0; }
        }

        /* Central Diamond */
        .tilt-wrapper {
            transition: transform 0.2s ease-out; transform-style: preserve-3d;
            cursor: crosshair; z-index: 5; will-change: transform;
        }
        .diamond {
            width: 140px; height: 140px; background-color: white;
            transform: rotate(45deg) translateZ(0); display: flex;
            justify-content: center; align-items: center;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.15);
            backface-visibility: hidden;
        }
        .upsilon { color: black; font-size: 80px; font-weight: bold; transform: rotate(-45deg); pointer-events: none; }

        /* Tactile Animation */
        .vibrate-active { animation: quick-vibrate 0.1s 3; }
        @keyframes quick-vibrate {
            0% { transform: rotate(45deg) scale(1); }
            50% { transform: rotate(47deg) scale(0.95); }
            100% { transform: rotate(45deg) scale(1); }
        }

        .subtitle { margin: 50px 0 25px 0; font-size: 0.65rem; letter-spacing: 8px; opacity: 0.6; text-align: center; }

        /* Nav Buttons */
        .nav-links { display: flex; flex-direction: column; gap: 12px; align-items: center; z-index: 10; }
        .nav-button {
            font-family: 'Courier New', monospace; color: white;
            text-decoration: none; font-size: 0.85rem; padding: 8px 20px;
            position: relative; border: 1px solid rgba(255,255,255,0.3);
            background: transparent; cursor: pointer; transition: color 0.2s;
            overflow: hidden; min-width: 180px; text-align: center;
        }
        .nav-button::before {
            content: ""; position: absolute; left: 0; top: 0; height: 100%; width: 0;
            background: white; z-index: -1; transition: none;
        }
        .nav-button.loading::before { width: 100%; transition: width 1.3s linear; }
        .nav-button.loading { color: black; }

        /* Audio Controls */
        .audio-player {
            margin-top: 30px; display: flex; align-items: center; gap: 25px; z-index: 15;
        }
        .audio-ctrl {
            background: none; border: none; color: white;
            font-size: 1.5rem; cursor: pointer; opacity: 0.6; transition: 0.2s;
        }
        .audio-ctrl:hover { opacity: 1; transform: scale(1.1); }
        
        #file-input { display: none; }
        .upload-label {
            font-family: 'Courier New', monospace; font-size: 0.7rem;
            border: 1px solid rgba(255,255,255,0.4); padding: 5px 10px;
            cursor: pointer; opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="brand-header">
        <div class="line1">🆈 𝘂𝗽𝘀𝗶𝗹𝗼𝗻.dev</div>
        <div class="line-mono">🅈 upsilon.media</div>
        <div class="line-mono">🅈 upsilon.zip</div>
    </div>

    <div class="container">
        <div class="tunnel-container" id="tunnel"></div>
        <div class="tilt-wrapper" id="target">
            <div class="diamond" id="main-diamond">
                <span class="upsilon">&Upsilon;</span>
            </div>
        </div>
        <div class="subtitle">AI + HUMAN COLLABORATION</div>
        
        <div class="nav-links">
            <div class="nav-button" data-url="https://upsilon.dev">⬪ upsilon.dev ⬪</div>
            <div class="nav-button" data-url="https://upsilon.media">⬪ upsilon.media ⬪</div>
            <div class="nav-button" data-url="https://upsilon.zip">⬪ upsilon.zip ⬪</div>
        </div>

        <div class="audio-player">
            <label for="file-input" class="upload-label">ADD MUSIC +</label>
            <input type="file" id="file-input" accept="audio/*" multiple>
            <button class="audio-ctrl" id="play-pause">⏯️</button>
            <button class="audio-ctrl" id="next-track">⏭️</button>
        </div>
    </div>

    <audio id="audio-element" crossorigin="anonymous"></audio>

    <script>
        const diamond = document.getElementById('main-diamond');
        const tunnel = document.getElementById('tunnel');
        const audio = document.getElementById('audio-element');
        const fileInput = document.getElementById('file-input');
        const playPauseBtn = document.getElementById('play-pause');
        const nextBtn = document.getElementById('next-track');

        // Combined Playlist: Add your GitHub Raw URLs here
        let playlist = [
            'https://raw.githubusercontent.com/YourUser/YourRepo/main/song1.mp3',
            'https://raw.githubusercontent.com/YourUser/YourRepo/main/song2.mp3'
        ];
        
        let currentIndex = 0;
        let audioCtx, analyser, dataArray, source;
        let isInitialized = false;
        let currentScale = 1;
        let lastRingTime = 0;

        function createRing(color = 'white') {
            const ring = document.createElement('div');
            ring.className = 'ring';
            ring.style.borderColor = color;
            ring.style.boxShadow = `0 0 15px ${color}`;
            tunnel.appendChild(ring);
            setTimeout(() => ring.remove(), 3000);
        }

        // Tactile Push Interaction
        function triggerTactile() {
            diamond.classList.add('vibrate-active');
            createRing('white');
            setTimeout(() => diamond.classList.remove('vibrate-active'), 300);
        }
        diamond.parentElement.addEventListener('mousedown', triggerTactile);
        diamond.parentElement.addEventListener('touchstart', triggerTactile);

        // Passive Rings when music is off
        setInterval(() => { if (audio.paused) createRing('rgba(255,255,255,0.1)'); }, 2000);

        // Navigation Loading Logic
        document.querySelectorAll('.nav-button').forEach(btn => {
            let timer;
            const url = btn.getAttribute('data-url');
            btn.onmouseenter = btn.ontouchstart = () => {
                btn.classList.add('loading');
                timer = setTimeout(() => {
                    if(confirm("Navigate to " + url + "?")) window.open(url, '_blank');
                    btn.classList.remove('loading');
                }, 1300);
            };
            btn.onmouseleave = btn.ontouchend = () => {
                btn.classList.remove('loading');
                clearTimeout(timer);
            };
        });

        // Initialize Web Audio
        function initAudio() {
            if (isInitialized) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 128; 
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            isInitialized = true;
            renderFrame();
        }

        // Handle Multiple File Uploads
        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                playlist.push(URL.createObjectURL(file));
            });
            if (audio.paused) playCurrent();
        });

        function playCurrent() {
            initAudio();
            if (playlist.length === 0) return;
            audio.src = playlist[currentIndex];
            audio.load();
            audio.play().catch(err => {
                console.error("Playback failed. Check GitHub URLs.", err);
                // Move to next if current fails
                setTimeout(playNext, 1000);
            });
        }

        function playNext() {
            currentIndex = (currentIndex + 1) % playlist.length;
            playCurrent();
        }

        function renderFrame() {
            requestAnimationFrame(renderFrame);
            if (!isInitialized || audio.paused) {
                currentScale += (1 - currentScale) * 0.1;
                diamond.style.transform = `rotate(45deg) scale(${currentScale}) translateZ(0)`;
                return;
            }

            analyser.getByteFrequencyData(dataArray);
            let bass = dataArray[2]; 
            let mid = dataArray[10];

            let targetScale = 1 + (bass / 500);
            currentScale += (targetScale - currentScale) * 0.15;
            diamond.style.transform = `rotate(45deg) scale(${currentScale}) translateZ(0)`;

            // High Color Variation
            let hue = (bass + mid) % 360;
            let dynamicColor = `hsl(${hue}, 90%, 60%)`;

            if (bass > 195 && Date.now() - lastRingTime > 150) {
                createRing(dynamicColor);
                lastRingTime = Date.now();
            }
        }

        playPauseBtn.onclick = () => {
            if (!audio.src && playlist.length > 0) playCurrent();
            else audio.paused ? audio.play() : audio.pause();
        };

        nextBtn.onclick = playNext;
        audio.onended = playNext; // Continuous play logic

        // Tilt effect
        window.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 20;
            const y = (window.innerHeight / 2 - e.pageY) / 20;
            document.getElementById('target').style.transform = `rotateX(${y}deg) rotateY(${-x}deg)`;
        });
    </script>
</body>
</html>
