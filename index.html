<!DOCTYPE html>
<html lang="𝄏">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>upsilon.dev</title>
    <style>
        :root {
            --prism-hue: 260;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: #fff;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Inter', sans-serif; overflow: hidden;
            touch-action: none;
        }

        #grid-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        .brand-header {
            position: absolute; top: 25px; left: 25px;
            display: flex; flex-direction: column; gap: 5px; z-index: 10;
        }
        .line1 { font-weight: bold; font-size: 1.1rem; letter-spacing: 1px; }
        .line-mono { font-family: 'Courier New', monospace; font-size: 0.85rem; opacity: 0.6; }

        .ui-container {
            position: relative; z-index: 5;
            display: flex; flex-direction: column;
            align-items: center; width: 100%;
            pointer-events: none;
        }

        .tilt-wrapper {
            transition: transform 0.2s ease-out;
            will-change: transform; pointer-events: auto;
        }

        .diamond {
            width: 140px; height: 140px; 
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.4);
            transform: rotate(45deg);
            display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.05);
        }

        .diamond::before {
            content: ""; position: absolute; top: -100%; left: -100%; width: 300%; height: 300%;
            background: conic-gradient(from 180deg at 50% 50%, transparent, hsla(var(--prism-hue), 100%, 70%, 0.1), transparent);
            animation: rotate-prism 10s infinite linear;
        }
        @keyframes rotate-prism { 100% { transform: rotate(360deg); } }

        .upsilon { 
            color: #fff; font-size: 80px; font-weight: bold; 
            transform: rotate(-45deg); text-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        .subtitle-area { margin: 35px 0 15px 0; text-align: center; }
        .subtitle { font-size: 0.6rem; letter-spacing: 8px; opacity: 0.5; text-transform: uppercase; }

        .nav-links { 
            display: flex; flex-direction: column; gap: 10px; 
            align-items: center; width: 100%; pointer-events: auto;
        }
        .nav-button {
            font-family: 'Courier New', monospace; color: #fff;
            text-decoration: none; font-size: 0.75rem; padding: 10px 20px;
            border: 1px solid rgba(255,255,255,0.15); background: rgba(0,0,0,0.4); 
            cursor: pointer; min-width: 220px; text-align: center;
            position: relative; overflow: hidden; outline: none;
            user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
        }
        .nav-button span {
            position: relative; z-index: 2; pointer-events: none;
        }
        .load-progress {
            position: absolute; left: 0; top: 0; height: 100%; width: 0%;
            background: #fff; z-index: 1; transition: width 0.05s linear;
        }
        .nav-button.active-load { color: #000; border-color: #fff; }

        .audio-player { margin-top: 25px; display: flex; align-items: center; gap: 20px; z-index: 15; pointer-events: auto; }
        .audio-ctrl { background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; opacity: 0.6; }

        #playlist-container {
            margin-top: 15px; max-height: 85px; overflow-y: auto; width: 280px;
            text-align: center; font-family: 'Courier New', monospace; font-size: 0.65rem;
            color: rgba(255,255,255,0.3); scrollbar-width: none;
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 25%, black 75%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 25%, black 75%, transparent 100%);
            padding: 25px 0; pointer-events: auto;
        }
        #playlist-container::-webkit-scrollbar { display: none; }
        .track-item { padding: 6px 0; transition: all 0.3s ease; cursor: pointer; }
        .track-item.active { color: #fff; font-weight: bold; transform: scale(1.05); }

        #file-input { display: none; }
        .upload-label { font-family: 'Courier New', monospace; font-size: 0.6rem; border: 1px solid rgba(255,255,255,0.2); padding: 5px 12px; cursor: pointer; }
    </style>
</head>
<body>

    <canvas id="grid-canvas"></canvas>

    <div class="brand-header">
        <div class="line1">🆈 𝘂𝗽𝘀𝗶𝗹𝗼𝗻.dev</div>
        <div class="line-mono">🅈 upsilon.media</div>
        <div class="line-mono">🅈 upsilon.zip</div>
    </div>

    <div class="ui-container">
        <div class="tilt-wrapper" id="target">
            <div class="diamond" id="main-diamond"><span class="upsilon">&Upsilon;</span></div>
        </div>
        
        <div class="subtitle-area">
            <div class="subtitle">AI + HUMAN COLLABORATION</div>
        </div>
        
        <div class="nav-links">
            <div class="nav-button" data-url="https://upsilon.dev"><div class="load-progress"></div><span>⬪ upsilon.dev ⬪</span></div>
            <div class="nav-button" data-url="https://upsilon.media"><div class="load-progress"></div><span>⬪ upsilon.media ⬪</span></div>
            <div class="nav-button" data-url="https://upsilon.zip"><div class="load-progress"></div><span>⬪ upsilon.zip ⬪</span></div>
        </div>

        <div class="audio-player">
            <label for="file-input" class="upload-label">IMPORT +</label>
            <input type="file" id="file-input" accept="audio/*" multiple>
            <button class="audio-ctrl" id="play-pause">⏯</button>
            <button class="audio-ctrl" id="next-track">⏭</button>
        </div>
        <div id="playlist-container"></div>
    </div>

    <audio id="audio-element" crossorigin="anonymous"></audio>

    <script>
        const canvas = document.getElementById('grid-canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const audio = document.getElementById('audio-element');
        const fileInput = document.getElementById('file-input');
        const playlistUI = document.getElementById('playlist-container');

        let playlist = [{ name: "🌫️leavemealone.mp3", url: "https://raw.githubusercontent.com/666F78646965/upsilon.dev/main/leavemealone.mp3" }];
        let currentIndex = 0, audioCtx, analyser, dataArray, isInitialized = false;
        
        let width, height;
        let scrollOffset = 0;
        let waveAmplitude = 0;
        let gridHue = 0;
        let isUkrainianMode = false;
        let activeColors = 0; 

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const gridSize = 45;
        const perspective = 300;
        const horizon = 0.45;

        function project(x, y, z) {
            const scale = perspective / (z || 1);
            return { x: width / 2 + x * scale, y: height * horizon + (y + 80) * scale };
        }

        function getColor(index, alpha) {
            if (activeColors < 0.05) return `rgba(255, 255, 255, ${alpha * 0.2})`;
            
            let colorStr;
            if (isUkrainianMode) {
                colorStr = index % 2 === 0 ? `255, 255, 0` : `0, 229, 255`;
            } else {
                return `hsla(${gridHue + index * 8}, 100%, 60%, ${alpha * (0.2 + activeColors * 0.4)})`;
            }
            
            const rBase = 255, gBase = 255, bBase = 255;
            const [rT, gT, bT] = colorStr.split(',').map(Number);
            
            const r = Math.round(rBase + (rT - rBase) * activeColors);
            const g = Math.round(gBase + (gT - gBase) * activeColors);
            const b = Math.round(bBase + (bT - bBase) * activeColors);
            
            return `rgba(${r}, ${g}, ${b}, ${alpha * (0.2 + activeColors * 0.4)})`;
        }

        function drawGrid(time) {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);
            
            scrollOffset += 0.5 + (waveAmplitude * 0.01); 
            if (scrollOffset >= gridSize) scrollOffset = 0;

            const rows = 28;
            const cols = 22;
            const audioEffect = waveAmplitude * 0.8;

            ctx.lineWidth = 1;

            for (let i = -cols; i <= cols; i++) {
                ctx.beginPath();
                const xPos = i * gridSize;
                for (let j = 0; j < rows; j++) {
                    const zPos = j * gridSize - scrollOffset;
                    if (zPos <= 0) continue;

                    const undulation = Math.sin(xPos * 0.01 + zPos * 0.01 + time * 0.002) * audioEffect;
                    const p = project(xPos, undulation, zPos);
                    
                    if (j === 0) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                }
                const alpha = 1 - (i === 0 ? 0 : Math.abs(i) / cols);
                ctx.strokeStyle = getColor(Math.abs(i), alpha);
                ctx.stroke();
            }

            for (let j = 1; j < rows; j++) {
                ctx.beginPath();
                const zPos = j * gridSize - scrollOffset;
                if (zPos <= 0) continue;

                const alpha = Math.max(0, 1 - (zPos / (rows * gridSize)));

                for (let i = -cols; i <= cols; i++) {
                    const xPos = i * gridSize;
                    const undulation = Math.sin(xPos * 0.01 + zPos * 0.01 + time * 0.002) * audioEffect;
                    const p = project(xPos, undulation, zPos);
                    
                    if (i === -cols) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                }
                ctx.strokeStyle = getColor(j, alpha);
                ctx.stroke();
            }
        }

        function render(time) {
            if (isInitialized && !audio.paused) {
                analyser.getByteFrequencyData(dataArray);
                const bass = dataArray[2];
                const treble = dataArray[50];
                
                waveAmplitude = bass;
                gridHue = (bass * 1.5 + treble + time * 0.05) % 360;
                activeColors += (1 - activeColors) * 0.05;
                
                document.documentElement.style.setProperty('--prism-hue', bass % 360);
                document.getElementById('main-diamond').style.transform = `rotate(45deg) scale(${1 + bass/600})`;
            } else {
                waveAmplitude *= 0.95;
                activeColors *= 0.95;
                document.getElementById('main-diamond').style.transform = `rotate(45deg) scale(1)`;
            }

            drawGrid(time);
            requestAnimationFrame(render);
        }

        function initAudio() {
            if (isInitialized) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                const source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                analyser.fftSize = 128;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                isInitialized = true;
            } catch(e) {}
        }

        document.querySelectorAll('.nav-button').forEach(btn => {
            const bar = btn.querySelector('.load-progress');
            let timer;
            let triggered = false;

            const start = (e) => {
                if (e.cancelable) e.preventDefault();
                if (triggered) return;
                
                btn.classList.add('active-load');
                let p = 0;
                clearInterval(timer);
                
                timer = setInterval(() => {
                    p += 4;
                    if (p >= 100) {
                        p = 100;
                        clearInterval(timer);
                        bar.style.width = p + '%';
                        triggered = true;
                        
                        setTimeout(() => {
                            window.open(btn.dataset.url, '_blank');
                            reset();
                        }, 150);
                    } else {
                        bar.style.width = p + '%';
                    }
                }, 20);
            };

            const reset = () => { 
                clearInterval(timer); 
                bar.style.width = '0%'; 
                btn.classList.remove('active-load'); 
                setTimeout(() => { triggered = false; }, 200);
            };

            btn.addEventListener('pointerdown', start);
            btn.addEventListener('pointerup', reset);
            btn.addEventListener('pointerleave', reset);
            btn.addEventListener('contextmenu', e => e.preventDefault());
        });

        function updateUI() {
            playlistUI.innerHTML = '';
            playlist.forEach((t, i) => {
                const item = document.createElement('div');
                item.className = 'track-item' + (i === currentIndex ? ' active' : '');
                item.innerText = t.name.toUpperCase();
                item.onclick = () => { currentIndex = i; play(); };
                playlistUI.appendChild(item);
                
                if (i === currentIndex) {
                    setTimeout(() => {
                        item.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 50);
                }
            });
        }

        fileInput.onchange = (e) => {
            Array.from(e.target.files).forEach(f => playlist.push({ name: f.name, url: URL.createObjectURL(f) }));
            updateUI();
        };

        function play() {
            initAudio();
            const currentTrack = playlist[currentIndex];
            isUkrainianMode = /[а-яА-ЯёЁіІїЇєЄґҐ]/.test(currentTrack.name);
            audio.src = currentTrack.url;
            audio.play().catch(() => {});
            updateUI();
        }

        document.getElementById('play-pause').onclick = () => audio.paused ? (audio.src ? audio.play() : play()) : audio.pause();
        document.getElementById('next-track').onclick = () => { currentIndex = (currentIndex + 1) % playlist.length; play(); };
        audio.onended = () => document.getElementById('next-track').click();

        window.addEventListener('mousemove', (e) => {
            const x = (width/2 - e.clientX) / 40;
            const y = (height/2 - e.clientY) / 40;
            document.getElementById('target').style.transform = `rotateX(${y}deg) rotateY(${-x}deg)`;
        });

        updateUI();
        requestAnimationFrame(render);
    </script>
</body>
</html>
