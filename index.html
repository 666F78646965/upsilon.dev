<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>upsilon.dev</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: black; color: white;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Inter', sans-serif; overflow: hidden;
            perspective: 1200px; touch-action: none;
        }

        .brand-header {
            position: absolute; top: 25px; left: 25px;
            display: flex; flex-direction: column; gap: 5px; z-index: 10;
        }
        .line1 { font-weight: bold; font-size: 1.1rem; }
        .line-mono { font-family: 'Courier New', monospace; font-size: 0.9rem; opacity: 0.8; }

        .container { display: flex; flex-direction: column; align-items: center; position: relative; width: 100%; }

        .tunnel-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); pointer-events: none;
        }
        .ring {
            position: absolute; width: 160px; height: 160px;
            border: 1.5px solid white; background: transparent;
            transform: translate(-50%, -50%) rotate(45deg) scale(1);
            will-change: transform, opacity;
            animation: wave-expand 2.5s forwards cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        @keyframes wave-expand {
            0% { transform: translate(-50%, -50%) rotate(45deg) scale(1); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) rotate(45deg) scale(4); opacity: 0; }
        }

        .tilt-wrapper {
            transition: transform 0.2s ease-out; transform-style: preserve-3d;
            cursor: crosshair; z-index: 5; will-change: transform;
        }
        .diamond {
            width: 140px; height: 140px; background-color: white;
            transform: rotate(45deg); display: flex;
            justify-content: center; align-items: center;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.15);
            -webkit-backface-visibility: hidden;
        }
        .upsilon { color: black; font-size: 80px; font-weight: bold; transform: rotate(-45deg); pointer-events: none; }

        .subtitle { margin: 50px 0 25px 0; font-size: 0.65rem; letter-spacing: 8px; opacity: 0.6; text-align: center; }

        .nav-links { display: flex; flex-direction: column; gap: 10px; align-items: center; z-index: 10; }
        .nav-button {
            font-family: 'Courier New', monospace; color: white;
            text-decoration: none; font-size: 0.8rem; padding: 6px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            background: transparent; cursor: pointer; transition: 0.2s;
        }
        .nav-button:hover { background: white; color: black; }

        .audio-player {
            margin-top: 25px; display: flex; align-items: center; gap: 20px; z-index: 15;
        }
        .audio-ctrl {
            background: none; border: none; color: white;
            font-size: 1.4rem; cursor: pointer; opacity: 0.6;
        }
        .audio-ctrl:hover { opacity: 1; }

        #file-input { display: none; }
        .upload-label {
            font-family: 'Courier New', monospace; font-size: 0.6rem;
            border: 1px solid rgba(255,255,255,0.3); padding: 4px 8px;
            cursor: pointer; opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="brand-header">
        <div class="line1">🆈 𝘂𝗽𝘀𝗶𝗹𝗼𝗻.dev</div>
        <div class="line-mono">🅈 upsilon.media</div>
        <div class="line-mono">🅈 upsilon.zip</div>
    </div>

    <div class="container">
        <div class="tunnel-container" id="tunnel"></div>
        <div class="tilt-wrapper" id="target">
            <div class="diamond" id="main-diamond">
                <span class="upsilon">&Upsilon;</span>
            </div>
        </div>
        <div class="subtitle">AI + HUMAN COLLABORATION</div>
        <div class="nav-links">
            <div class="nav-button" onclick="window.open('https://upsilon.dev','_blank')">⬪ upsilon.dev ⬪</div>
            <div class="nav-button" onclick="window.open('https://upsilon.media','_blank')">⬪ upsilon.media ⬪</div>
        </div>

        <div class="audio-player">
            <label for="file-input" class="upload-label">UPLOAD MP3</label>
            <input type="file" id="file-input" accept="audio/*">
            <button class="audio-ctrl" id="play-pause">⏯️</button>
            <button class="audio-ctrl" id="next-track">⏭️</button>
        </div>
    </div>

    <audio id="audio-element" crossorigin="anonymous"></audio>

    <script>
        const target = document.getElementById('target');
        const diamond = document.getElementById('main-diamond');
        const tunnel = document.getElementById('tunnel');
        const audio = document.getElementById('audio-element');
        const fileInput = document.getElementById('file-input');
        const playPauseBtn = document.getElementById('play-pause');
        const nextBtn = document.getElementById('next-track');

        // Add your GitHub Raw MP3 URLs here
        const playlist = [
            'https://raw.githubusercontent.com/YourUsername/YourRepo/main/raindrop.mp3',
            'https://raw.githubusercontent.com/YourUsername/YourRepo/main/track2.mp3',
            'https://raw.githubusercontent.com/YourUsername/YourRepo/main/track3.mp3'
        ];
        let currentTrackIndex = 0;

        let audioCtx, analyser, dataArray, source;
        let isInitialized = false;
        let currentScale = 1;
        let lastRingTime = 0;

        function createRing(color = 'white') {
            const ring = document.createElement('div');
            ring.className = 'ring';
            ring.style.borderColor = color;
            ring.style.boxShadow = `0 0 10px ${color}`;
            tunnel.appendChild(ring);
            setTimeout(() => ring.remove(), 2500);
        }

        window.addEventListener('mousemove', (e) => {
            const tiltX = (0.5 - (e.clientY / window.innerHeight)) * 15;
            const tiltY = ((e.clientX / window.innerWidth) - 0.5) * 15;
            target.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg) translateZ(0)`;
        });

        fileInput.addEventListener('change', function() {
            if (this.files.length > 0) {
                const url = URL.createObjectURL(this.files[0]);
                initAudio();
                audio.src = url;
                audio.play();
            }
        });

        function initAudio() {
            if (isInitialized) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 128; // Smaller FFT for mobile performance
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            isInitialized = true;
            renderFrame();
        }

        function playNext() {
            initAudio();
            currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
            audio.src = playlist[currentTrackIndex];
            audio.play().catch(() => {});
        }

        function renderFrame() {
            requestAnimationFrame(renderFrame);
            if (!isInitialized || audio.paused) {
                currentScale += (1 - currentScale) * 0.1;
                diamond.style.transform = `rotate(45deg) scale(${currentScale}) translateZ(0)`;
                return;
            }

            analyser.getByteFrequencyData(dataArray);
            let bass = 0, mid = 0, high = 0;
            for (let i = 0; i < 4; i++) bass += dataArray[i];
            for (let i = 8; i < 16; i++) mid += dataArray[i];
            for (let i = 20; i < 40; i++) high += dataArray[i];
            
            bass /= 4; mid /= 8; high /= 20;

            // Smoother scaling for mobile
            let targetScale = 1 + (bass / 500);
            currentScale += (targetScale - currentScale) * 0.15;
            diamond.style.transform = `rotate(45deg) scale(${currentScale}) translateZ(0)`;

            // High variation color logic (HSL for more vibrancy)
            let hue = (bass + mid + high) % 360; 
            let dynamicColor = `hsl(${hue}, 80%, 60%)`;
            
            const now = Date.now();
            if (bass > 180 && now - lastRingTime > 150) {
                createRing(dynamicColor);
                lastRingTime = now;
            }
        }

        playPauseBtn.addEventListener('click', () => {
            initAudio();
            if (!audio.src) audio.src = playlist[currentTrackIndex];
            audio.paused ? audio.play() : audio.pause();
        });

        nextBtn.addEventListener('click', playNext);
        audio.addEventListener('ended', playNext);
    </script>
</body>
</html>
