<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>upsilon.dev</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: black; color: white;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Inter', sans-serif; overflow: hidden;
            perspective: 1200px; touch-action: none;
        }

        .brand-header {
            position: absolute; top: 25px; left: 25px;
            display: flex; flex-direction: column; gap: 5px; z-index: 10;
        }
        .line1 { font-weight: bold; font-size: 1.1rem; }
        .line-mono { font-family: 'Courier New', monospace; font-size: 0.9rem; opacity: 0.8; }

        .container { display: flex; flex-direction: column; align-items: center; position: relative; width: 100%; }

        .tunnel-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); pointer-events: none;
        }
        .ring {
            position: absolute; width: 160px; height: 160px;
            border: 1.5px solid white; background: transparent;
            transform: translate(-50%, -50%) rotate(45deg) scale(1);
            will-change: transform, opacity;
            animation: wave-expand 3s forwards linear;
        }
        @keyframes wave-expand {
            0% { transform: translate(-50%, -50%) rotate(45deg) scale(1); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) rotate(45deg) scale(5); opacity: 0; }
        }

        .tilt-wrapper {
            transition: transform 0.2s ease-out; transform-style: preserve-3d;
            cursor: crosshair; z-index: 5; will-change: transform;
        }
        .diamond {
            width: 140px; height: 140px; background-color: white;
            transform: rotate(45deg) translateZ(0); display: flex;
            justify-content: center; align-items: center;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.15);
            backface-visibility: hidden;
        }
        .upsilon { color: black; font-size: 80px; font-weight: bold; transform: rotate(-45deg); pointer-events: none; }

        .vibrate-active { animation: quick-vibrate 0.1s infinite; }
        @keyframes quick-vibrate {
            0% { transform: rotate(45deg) translate(0,0); }
            50% { transform: rotate(45.5deg) translate(2px, -2px); }
            100% { transform: rotate(45deg) translate(0,0); }
        }

        .subtitle { margin: 50px 0 25px 0; font-size: 0.65rem; letter-spacing: 8px; opacity: 0.6; text-align: center; }

        .nav-links { display: flex; flex-direction: column; gap: 12px; align-items: center; z-index: 10; }
        .nav-button {
            font-family: 'Courier New', monospace; color: white;
            text-decoration: none; font-size: 0.85rem; padding: 8px 20px;
            position: relative; border: 1px solid rgba(255,255,255,0.3);
            background: transparent; cursor: pointer; transition: color 0.2s;
            overflow: hidden; min-width: 180px; text-align: center;
        }
        .nav-button::before {
            content: ""; position: absolute; left: 0; top: 0; height: 100%; width: 0;
            background: white; z-index: -1; transition: none;
        }
        .nav-button.loading::before { width: 100%; transition: width 1.3s linear; }
        .nav-button.loading { color: black; }

        .audio-player {
            margin-top: 30px; display: flex; align-items: center; gap: 25px; z-index: 15;
        }
        .audio-ctrl {
            background: none; border: none; color: white;
            font-size: 1.5rem; cursor: pointer; opacity: 0.6; transition: 0.2s;
        }
        .audio-ctrl:hover { opacity: 1; transform: scale(1.1); }

        #file-input { display: none; }
        .upload-label {
            font-family: 'Courier New', monospace; font-size: 0.7rem;
            border: 1px solid rgba(255,255,255,0.4); padding: 5px 10px;
            cursor: pointer; opacity: 0.6; transition: 0.2s;
        }
        .upload-label:hover { opacity: 1; background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="brand-header">
        <div class="line1">🆈 𝘂𝗽𝘀𝗶𝗹𝗼𝗻.dev</div>
        <div class="line-mono">🅈 upsilon.media</div>
        <div class="line-mono">🅈 upsilon.zip</div>
    </div>

    <div class="container">
        <div class="tunnel-container" id="tunnel"></div>
        <div class="tilt-wrapper" id="target">
            <div class="diamond" id="main-diamond">
                <span class="upsilon">&Upsilon;</span>
            </div>
        </div>
        <div class="subtitle">AI + HUMAN COLLABORATION</div>
        <div class="nav-links">
            <div class="nav-button" data-url="https://upsilon.dev">⬪ upsilon.dev ⬪</div>
            <div class="nav-button" data-url="https://upsilon.media">⬪ upsilon.media ⬪</div>
            <div class="nav-button" data-url="https://upsilon.zip">⬪ upsilon.zip ⬪</div>
        </div>

        <div class="audio-player">
            <label for="file-input" class="upload-label">UPLOAD MP3</label>
            <input type="file" id="file-input" accept="audio/*">
            <button class="audio-ctrl" id="play-pause">⏯️</button>
            <button class="audio-ctrl" id="next-track">⏭️</button>
        </div>
    </div>

    <audio id="audio-element" crossorigin="anonymous"></audio>

    <script>
        const target = document.getElementById('target');
        const diamond = document.getElementById('main-diamond');
        const tunnel = document.getElementById('tunnel');
        const audio = document.getElementById('audio-element');
        const fileInput = document.getElementById('file-input');
        const playPauseBtn = document.getElementById('play-pause');
        const nextBtn = document.getElementById('next-track');

        // IMPORTANT: Use RAW github links (raw.githubusercontent.com)
        const playlist = [
            'https://raw.githubusercontent.com/YourUsername/YourRepo/main/track1.mp3',
            'https://raw.githubusercontent.com/YourUsername/YourRepo/main/track2.mp3'
        ];
        let currentTrackIndex = 0;
        let loadTimer;
        let audioCtx, analyser, dataArray, source;
        let isInitialized = false;
        let currentScale = 1;
        let lastRingTime = 0;

        function createRing(color = 'white') {
            const ring = document.createElement('div');
            ring.className = 'ring';
            ring.style.borderColor = color;
            ring.style.boxShadow = `0 0 15px ${color}`;
            tunnel.appendChild(ring);
            setTimeout(() => ring.remove(), 3000);
        }

        // TACTILE INTERACTION
        const triggerInteraction = () => {
            diamond.classList.add('vibrate-active');
            for(let i=0; i<4; i++) setTimeout(() => createRing('white'), i * 100);
            setTimeout(() => diamond.classList.remove('vibrate-active'), 400);
        };
        window.addEventListener('mousedown', triggerInteraction);
        window.addEventListener('touchstart', triggerInteraction);

        // Passive animation loop
        setInterval(() => {
            if (audio.paused) createRing('rgba(255,255,255,0.2)');
        }, 1500);

        window.addEventListener('mousemove', (e) => {
            const tiltX = (0.5 - (e.clientY / window.innerHeight)) * 15;
            const tiltY = ((e.clientX / window.innerWidth) - 0.5) * 15;
            target.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg) translateZ(0)`;
        });

        // Navigation Buttons with Loading Effect
        document.querySelectorAll('.nav-button').forEach(btn => {
            const url = btn.getAttribute('data-url');
            const startLoad = () => {
                btn.classList.add('loading');
                loadTimer = setTimeout(() => {
                    if (confirm(`Open ${url}?`)) window.open(url, '_blank');
                    btn.classList.remove('loading');
                }, 1300);
            };
            const cancelLoad = () => {
                btn.classList.remove('loading');
                clearTimeout(loadTimer);
            };
            btn.addEventListener('mouseenter', startLoad);
            btn.addEventListener('mouseleave', cancelLoad);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); startLoad(); });
            btn.addEventListener('touchend', cancelLoad);
        });

        fileInput.addEventListener('change', function() {
            if (this.files.length > 0) {
                const url = URL.createObjectURL(this.files[0]);
                initAudio();
                audio.src = url;
                audio.play();
            }
        });

        function initAudio() {
            if (isInitialized) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 128; 
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            isInitialized = true;
            renderFrame();
        }

        function playTrack() {
            initAudio();
            audio.src = playlist[currentTrackIndex];
            audio.load();
            audio.play().catch(e => console.log("CORS or Link Error: Check GitHub link format."));
        }

        function renderFrame() {
            requestAnimationFrame(renderFrame);
            if (!isInitialized || audio.paused) {
                currentScale += (1 - currentScale) * 0.1;
                diamond.style.transform = `rotate(45deg) scale(${currentScale}) translateZ(0)`;
                return;
            }

            analyser.getByteFrequencyData(dataArray);
            let bass = 0, mid = 0, high = 0;
            for (let i = 0; i < 4; i++) bass += dataArray[i];
            for (let i = 8; i < 16; i++) mid += dataArray[i];
            for (let i = 20; i < 40; i++) high += dataArray[i];
            
            bass /= 4; mid /= 8; high /= 20;

            let targetScale = 1 + (bass / 550);
            currentScale += (targetScale - currentScale) * 0.1;
            diamond.style.transform = `rotate(45deg) scale(${currentScale}) translateZ(0)`;

            let hue = (bass * 0.6 + mid * 1.1 + high * 2.2) % 360;
            let dynamicColor = `hsl(${hue}, 85%, 65%)`;

            const now = Date.now();
            if (bass > 190 && now - lastRingTime > 140) {
                createRing(dynamicColor);
                lastRingTime = now;
            }
        }

        playPauseBtn.addEventListener('click', () => {
            initAudio();
            if (!audio.src) {
                playTrack();
            } else {
                audio.paused ? audio.play() : audio.pause();
            }
        });

        nextBtn.addEventListener('click', () => {
            currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
            playTrack();
        });

        audio.addEventListener('ended', () => {
            currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
            playTrack();
        });
    </script>
</body>
</html>
